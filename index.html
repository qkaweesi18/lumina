<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Store</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Open Graph / Social Media Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lumina Store" />
    <meta property="og:description" content="Minimalist living, simplified. Home goods, accessories, apparel, and art — curated for modern living." />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:url" content="https://lumina-jet.vercel.app" />
    <meta property="og:site_name" content="Lumina Store" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumina Store" />
    <meta name="twitter:description" content="Minimalist living, simplified. Home goods, accessories, apparel, and art — curated for modern living." />
    <meta name="twitter:image" content="/og-default.png" />
    <meta name="theme-color" content="#ffffff" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1a1a1a',
              secondary: '#f5f5f5',
              accent: '#3b82f6',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #1a1a1a;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* ===== CORE ANIMATIONS ===== */
      .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translate3d(0, 20px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }

      /* Fade In Down */
      .animate-fade-in-down {
        animation: fadeInDown 0.4s ease-out forwards;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translate3d(0, -20px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }

      /* Fade In */
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Scale In */
      .animate-scale-in {
        animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Slide In Right */
      .animate-slide-in-right {
        animation: slideInRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Slide Out Right */
      .animate-slide-out-right {
        animation: slideOutRight 0.3s ease-in forwards;
      }

      @keyframes slideOutRight {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(100%);
        }
      }

      /* Bounce In */
      .animate-bounce-in {
        animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      }

      @keyframes bounceIn {
        0% {
          opacity: 0;
          transform: scale(0.3);
        }
        50% {
          transform: scale(1.05);
        }
        70% {
          transform: scale(0.95);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Pulse */
      .animate-pulse-soft {
        animation: pulseSoft 2s infinite;
      }

      @keyframes pulseSoft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      /* ===== SHIMMER LOADING ===== */
      .shimmer {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ===== GRADIENT ANIMATIONS ===== */
      .gradient-animate {
        background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #3b82f6, #1a1a1a);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Subtle gradient text */
      .text-gradient {
        background: linear-gradient(135deg, #1a1a1a 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ===== HOVER EFFECTS ===== */
      .hover-lift {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px -12px rgba(0,0,0,0.25);
      }

      .hover-glow {
        transition: box-shadow 0.3s ease;
      }
      .hover-glow:hover {
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
      }

      /* ===== BUTTON EFFECTS ===== */
      .btn-shine {
        position: relative;
        overflow: hidden;
      }
      .btn-shine::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s ease;
      }
      .btn-shine:hover::after {
        left: 100%;
      }

      /* ===== CART BADGE ANIMATION ===== */
      .cart-badge-pop {
        animation: badgePop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      @keyframes badgePop {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
      }

      /* ===== IMAGE HOVER EFFECTS ===== */
      .img-zoom {
        overflow: hidden;
      }
      .img-zoom img {
        transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .img-zoom:hover img {
        transform: scale(1.08);
      }

      /* ===== STAGGERED ANIMATIONS ===== */
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      .stagger-5 { animation-delay: 0.5s; }
      .stagger-6 { animation-delay: 0.6s; }

      /* ===== LOADING SPINNER ===== */
      .spinner {
        border: 2px solid #f3f3f3;
        border-top: 2px solid #1a1a1a;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* ===== FLOATING ANIMATION ===== */
      .float {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* ===== SUCCESS CHECKMARK ===== */
      .success-check {
        animation: checkScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes checkScale {
        0% { transform: scale(0) rotate(-45deg); }
        100% { transform: scale(1) rotate(0deg); }
      }

      /* ===== GLASSMORPHISM ===== */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .glass-dark {
        background: rgba(26, 26, 26, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      /* ===== RIPPLE EFFECT ===== */
      .ripple {
        position: relative;
        overflow: hidden;
      }
      .ripple::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255,255,255,0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s ease, height 0.6s ease;
      }
      .ripple:active::before {
        width: 300px;
        height: 300px;
      }

      /* ===== UNDERLINE EFFECT ===== */
      .underline-slide {
        position: relative;
      }
      .underline-slide::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #1a1a1a;
        transition: width 0.3s ease;
      }
      .underline-slide:hover::after {
        width: 100%;
      }

      /* ===== MODAL OVERLAY ANIMATION ===== */
      .overlay-fade {
        animation: overlayFade 0.3s ease forwards;
      }

      @keyframes overlayFade {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* ===== PAGE TRANSITIONS ===== */
      .page-enter {
        opacity: 0;
        transform: translateY(20px);
      }
      .page-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.4s ease, transform 0.4s ease;
      }

      /* ===== SMOOTH SCROLL ===== */
      html {
        scroll-behavior: smooth;
      }

      /* ===== FOCUS STATES ===== */
      input:focus, button:focus, textarea:focus {
        outline: none;
        transition: box-shadow 0.2s ease;
      }

      /* ===== SELECTION COLOR ===== */
      ::selection {
        background: #3b82f6;
        color: white;
      }

      /* ===== CUSTOM SCROLLBAR (visible version) ===== */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #a1a1a1;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
